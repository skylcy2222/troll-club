<div class="card">
    <h3>Troll Club Login</h3>

    <p id="user-display" style="color: var(--accent); font-weight: bold;"></p>

    <form id="auth-form" class="form-layout">

        <input
            type="text"
            id="username"
            placeholder="닉네임"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="이메일"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="비밀번호"
            required
        >

        <div style="display:flex;gap:10px">

            <button
                type="submit"
                value="login"
                class="btn">
                로그인
            </button>

            <button
                type="submit"
                value="register"
                class="btn outline">
                회원가입
            </button>

        </div>

    </form>
</div>
