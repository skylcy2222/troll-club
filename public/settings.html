<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="community.html">Community</a>
        <a href="board.html">Board</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="settings.html" class="active">Settings</a>

    <h1>Settings</h1>
    
    <div class="card">
        <h3>Theme Customizer</h3>
        <p style="margin-bottom: 25px; color: #666; font-size: 0.95rem;">원하는 색상으로 테마를 실시간 변경해보세요.</p>
        
        <div class="color-picker">
            <label for="primary-color">배경 색상 (Primary)</label>
            <input type="color" id="primary-color" onchange="setColor(this.value, '--primary')">
        </div>
        <div class="color-picker">
            <label for="text-color">글자 색상 (Text)</label>
            <input type="color" id="text-color" onchange="setColor(this.value, '--text')">
        </div>
        <div class="color-picker">
            <label for="accent-color">포인트 색상 (Accent)</label>
                <input type="color" id="accent-color" onchange="setColor(this.value, '--accent')">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
